    <text x="93" y="13" font-size="8" fill="#52c97a" font-weight="700">#6</text>
    <text x="116" y="75" font-size="9" fill="#52c97a" text-anchor="middle" transform="rotate(-90,116,75)">Shelf</text>

    <rect x="143" y="1" width="51" height="141" fill="#52c97a22" stroke="#52c97a" stroke-width="1.5" rx="2"/>
    <text x="146" y="13" font-size="8" fill="#52c97a" font-weight="700">#7</text>
    <text x="169" y="75" font-size="9" fill="#52c97a" text-anchor="middle" transform="rotate(-90,169,75)">Shelf</text>

    <rect x="196" y="1" width="51" height="141" fill="#52c97a22" stroke="#52c97a" stroke-width="1.5" rx="2"/>
    <text x="199" y="13" font-size="8" fill="#52c97a" font-weight="700">#8</text>
    <text x="222" y="75" font-size="9" fill="#52c97a" text-anchor="middle" transform="rotate(-90,222,75)">Shelf</text>

